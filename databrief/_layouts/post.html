---
layout: default
---
<article>
  <div class="post-header cat-{{ page.category }}">
    <span class="chip cat-{{ page.category }}">{{ page.category }}</span>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }} &middot; By {{ page.author | default: "The Databrief Staff" }} &middot; {{ content | number_of_words | divided_by: 200 | at_least: 1 }} min read</div>
  </div>

  <div class="post-body">
    {{ content }}
  </div>
</article>
